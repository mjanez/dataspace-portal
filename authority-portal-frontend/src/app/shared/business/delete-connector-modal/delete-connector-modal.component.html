<div *ngIf="visible" class="fixed z-50 inset-0 overflow-y-auto">
  <div class="flex items-center justify-center min-h-screen">
    <div
      class="fixed inset-0 bg-gray-500 bg-opacity-25 transition-opacity"></div>
    <div
      class="p-4 bg-white rounded-lg overflow-hidden shadow-xl transform transition-all sm:max-w-lg sm:w-full">
      <p class="confirmation-dialog-title">
        {{ 'DIALOGS.DELETE_CONNECTOR.TITLE' | translate }}
      </p>
      <div class="px-4 py-3 confirmation-dialog-prose">
        <div *ngIf="isCaasConnector">
          <p>{{ 'DIALOGS.DELETE_CONNECTOR.CAAS_INTRO' | translate }}</p>
          <ul class="list-disc mt-1 mb-4 px-4">
            <li>
              {{ 'DIALOGS.DELETE_CONNECTOR.CAAS_ITEM_DEPLOY' | translate }}
            </li>
            <li>
              {{ 'DIALOGS.DELETE_CONNECTOR.CAAS_ITEM_PORTAL' | translate }}
            </li>
          </ul>
        </div>
        <p>{{ 'DIALOGS.DELETE_CONNECTOR.CONFIRM' | translate }}</p>
      </div>
      <div class="px-4 py-3 flex justify-end gap-2">
        <button
          class="btn-outline"
          type="button"
          data-testid="delete-connector-dialog-cancel-btn"
          (click)="cancel.emit(null)">
          {{ 'COMMON.CANCEL' | translate }}
        </button>
        <button
          class="btn-accent-danger"
          type="button"
          data-testid="delete-connector-dialog-confirm-btn"
          (click)="confirm.emit(null)">
          {{ 'COMMON.DELETE' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
