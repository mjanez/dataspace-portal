<div
  class="container mx-auto h-screen flex flex-col justify-center items-center">
  <div class="fixed top-10 right-10 flex items-center gap-4">
    <app-language-switcher></app-language-switcher>
    <logout-button></logout-button>
  </div>
  <img
    alt="logo"
    [attr.src]="appConfig.brandLogoUnauthenticatedPage.src"
    [class]="appConfig.brandLogoUnauthenticatedPage.class" />
  <div class="max-w-2xl mx-auto text-center">
    <h1 class="full-screen-end-title">
      {{ 'PAGES.REGISTRATION.REJECTED_HEADING' | translate }}
    </h1>
    <p
      class="full-screen-end-prose"
      [innerHTML]="
        'PAGES.REGISTRATION.REJECTED_MESSAGE'
          | translate
            : {
                portalName: appConfig.portalName,
                dataspaceName: appConfig.brandDataspaceName
              }
      "></p>
  </div>
</div>
<!-- footer -->

<app-footer-for-full-page></app-footer-for-full-page>
